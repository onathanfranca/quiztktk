<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>Seu progresso anual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fdf2f7;
            padding: 16px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, .08);
            padding: 32px 28px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
            justify-content: center;
        }

        .left {
            flex: 1;
        }

        h1 {
            font-size: 32px;
            line-height: 1.1;
            color: #111827;
            margin-bottom: 6px;
        }

        h1 span.highlight {
            color: #f43f5e;
        }

        .subtitle {
            font-size: 16px;
            color: #4b5563;
            margin-bottom: 20px;
        }

        .calendar-img {
            max-width: 260px;
            width: 100%;
            display: block;
            border-radius: 20px;
            margin: -15px auto 20px auto;
        }

        .months {
            position: relative;
            padding: 8px 0;
            margin-bottom: 18px;
            width: 100%;
        }

        .months-inner {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .months-row {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            column-gap: 10px;
            align-items: center;
            width: 100%;
        }

        .month-item {
            padding: 11px 8px;
            border-radius: 14px;
            background: #ffe4ea;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 13px;
            color: #111827;
            opacity: .5;
            text-align: center;
            transition: opacity .2s, transform .2s, box-shadow .2s, background .2s, color .2s;
            min-width: 0;
        }

        .month-item.active {
            opacity: 1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 63, 94, .35);
        }

        .month-item.completed {
            background: #ecfdf3;
            color: #166534;
            opacity: 1;
            box-shadow: 0 4px 12px rgba(34, 197, 94, .30);
        }

        .month-item.pending {
            background: #fee2e2;
            color: #b91c1c;
            opacity: 1;
            box-shadow: 0 4px 12px rgba(248, 113, 113, .35);
        }

        .check-circle {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 2px solid #f43f5e;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            flex-shrink: 0;
            transition: border-color .2s, background .2s;
        }

        .check-circle svg {
            width: 12px;
            height: 12px;
            fill: none;
            stroke: #f43f5e;
            stroke-width: 2;
            transition: stroke .2s;
        }

        .month-item.completed .check-circle {
            border-color: #22c55e;
            background: #dcfce7;
        }

        .month-item.completed .check-circle svg {
            stroke: #16a34a;
        }

        .month-item.pending .check-circle {
            border-color: #ef4444;
            background: #fee2e2;
        }

        .month-item.pending .check-circle svg {
            stroke: #b91c1c;
        }

        .month-connector {
            width: 100%;
            max-width: 20px;
            height: 4px;
            border-radius: 999px;
            background: #fee2e2;
            position: relative;
            overflow: hidden;
            justify-self: center;
        }

        .month-connector-fill {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border-radius: inherit;
            transition: width .35s linear;
        }

        .progress-info {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 16px;
        }

        /* CORREÇÃO: margin-left removida daqui e colocada só no CSS,
           garantindo que o media query de mobile funcione corretamente */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 999px;
            border: none;
            outline: none;
            background: #f43f5e;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform .12s, box-shadow .12s, opacity .12s;
            box-shadow: 0 10px 24px rgba(244, 63, 94, .35);
            opacity: 0;
            pointer-events: none;
            margin-left: 50px;
        }

        .btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(244, 63, 94, .4);
        }

        .tiktok-loader-overlay {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
        }

        .tiktok-loader-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 6px solid rgba(0, 0, 0, 0.06);
            border-top-color: #00f2ea;
            border-right-color: #ff0050;
            animation: tiktok-spin 1s linear infinite;
            margin-bottom: 18px;
        }

        .tiktok-loader-text {
            font-size: 14px;
            color: #111827;
            opacity: .7;
        }

        @keyframes tiktok-spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .card {
                flex-direction: column;
                align-items: flex-start;
            }
            /* CORREÇÃO: agora sobrescreve corretamente pois não há inline style */
            .btn {
                margin-left: 0;
            }
            .calendar-img {
                max-width: 240px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="left">
            <h1>Parabéns!<br>Você concluiu todas as atividades do ano.<br>
                <span class="highlight">Veja seu progresso!</span>
            </h1>
            <p class="subtitle">
                Estamos carregando seu histórico mês a mês. Aguarde alguns segundos enquanto confirmamos todas as etapas.
            </p>

            <img src="images/OoKNF1PITjyl.png" alt="Calendário anual" class="calendar-img">

            <div class="months">
                <div class="months-inner" id="months">
                    <!-- Linha 1 -->
                    <div class="months-row">
                        <div class="month-item">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            1/2
                        </div>
                        <div class="month-connector">
                            <div class="month-connector-fill"></div>
                        </div>
                        <div class="month-item">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            3/4
                        </div>
                        <div class="month-connector">
                            <div class="month-connector-fill"></div>
                        </div>
                        <div class="month-item">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            5/6
                        </div>
                    </div>

                    <!-- Linha 2 -->
                    <div class="months-row">
                        <div class="month-item">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            7/8
                        </div>
                        <div class="month-connector">
                            <div class="month-connector-fill"></div>
                        </div>
                        <div class="month-item">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            9/10
                        </div>
                        <div class="month-connector">
                            <div class="month-connector-fill"></div>
                        </div>
                        <div class="month-item pending">
                            <div class="check-circle">
                                <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            11/12
                        </div>
                    </div>
                </div>
            </div>

            <!-- CORREÇÃO: aria-live adicionado para acessibilidade -->
            <div class="progress-info" id="progressText" aria-live="polite">
                Iniciando carregamento de Jan/Fev…
            </div>

            <!-- CORREÇÃO: inline style removido, controlado pelo CSS -->
            <button class="btn" id="claimBtn" aria-label="Resgatar seu progresso anual">
                Resgatar progresso
            </button>
        </div>
    </div>

    <div class="tiktok-loader-overlay" id="tikTokLoader">
        <div class="tiktok-loader-circle"></div>
        <div class="tiktok-loader-text">Validando acesso...</div>
    </div>

    <script>
        const monthItems = document.querySelectorAll('.month-item');
        const connectorFills = document.querySelectorAll('.month-connector-fill');
        const progressText = document.getElementById('progressText');
        const claimBtn = document.getElementById('claimBtn');

        // CORREÇÃO: referências ao loader e card salvas uma única vez fora da função
        const tikTokLoader = document.getElementById('tikTokLoader');
        const card = document.querySelector('.card');

        const labels = ['Jan/Fev', 'Mar/Abr', 'Mai/Jun', 'Jul/Ago', 'Set/Out', 'Nov/Dez'];

        const TOTAL_STEPS = labels.length;
        const STEP_INTERVAL_MS = 900; // CORREÇÃO: nome deixa explícito que é milissegundos

        let currentIndex = 0;

        function updateStep() {
            monthItems.forEach((item, i) => {
                const isLast = (i === TOTAL_STEPS - 1);
                item.classList.toggle('active', i === currentIndex);
                item.classList.toggle('completed', !isLast && i < currentIndex);
            });

            // CORREÇÃO: lógica de conectores dinâmica — não quebra se o layout mudar
            // Conectores ficam nas posições 1, 3 do grid (índices pares = meses, ímpares = conectores)
            // Conector i é preenchido quando o mês à sua direita (índice i+1) foi alcançado
            connectorFills.forEach((fill, i) => {
                // Mapeamento: conector 0 liga mês 0→1, conector 1 liga 1→2, conector 2 liga 3→4, conector 3 liga 4→5
                const monthAfterConnector = i < 2 ? i + 1 : i + 2;
                fill.style.width = currentIndex >= monthAfterConnector ? '100%' : '0%';
            });

            if (currentIndex < TOTAL_STEPS - 2) {
                progressText.textContent = 'Carregando ' + labels[currentIndex + 1] + '…';
            } else if (currentIndex === TOTAL_STEPS - 2) {
                progressText.textContent = 'Carregando último período (Nov/Dez)…';
            } else {
                monthItems[TOTAL_STEPS - 1].classList.remove('pending');
                monthItems[TOTAL_STEPS - 1].classList.add('completed');
                progressText.textContent = 'Seu progresso foi concluído com sucesso!';
                claimBtn.classList.add('visible');
                // CORREÇÃO: loop declarado com const e clearInterval chamado aqui
                clearInterval(loop);
            }
        }

        updateStep();

        // CORREÇÃO: declarado e atribuído juntos, sem janela de undefined
        const loop = setInterval(() => {
            if (currentIndex < TOTAL_STEPS - 1) {
                currentIndex++;
                updateStep();
            }
        }, STEP_INTERVAL_MS);

        function mostrarLoaderTikTok() {
            // CORREÇÃO: usa referências já salvas acima, sem re-query no DOM
            tikTokLoader.style.display = 'flex';
            card.style.visibility = 'hidden';

            setTimeout(() => {
                window.location.href = 'front/index.html';
            }, 3000);
        }

        claimBtn.addEventListener('click', mostrarLoaderTikTok);
    </script>

</body>
</html>
